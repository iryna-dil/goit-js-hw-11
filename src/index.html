<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla App Template</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <nav class="nav">
          <a class="nav-logo" href="./index.html" aria-label="Site logo">
            <svg class="nav-logo-icon" width="100" height="30">
              <use href="{=$icon-path}"></use>
            </svg>
          </a>
          <ul class="nav-list">
            <li class="nav-item">
              <a class="nav-link {=$highlight-act}" href="./pixabay-api.html"
                >Pixabay-api</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link {=$highlight-curr}"
                href="./render-functions.html"
                >Render Functions</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <div class="container image-search-page">
        <form class="form">
          <label>
            <input
              type="text"
              name="search-text"
              placeholder="Search images..."
              required
            />
          </label>
          <button type="submit">Search</button>
        </form>

        <span class="loader" aria-hidden="true"></span>

        <ul class="gallery"></ul>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <p class="footer-desc">
          Made with ✨ by
          <a
            class="footer-link"
            href="https://goit.global/ua/"
            target="_blank"
            rel="noopener noreferrer"
          >
            GoIT team
          </a>
        </p>
      </div>
    </footer>

    <script type="module" src="./main.js"></script>
  </body>
</html>
